<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; -webkit-tap-highlight-color: transparent; }
canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, dpr;
let organs = [];
let particles = [];
let meridianPhase = 0;
let breathPhase = 0;
let time = 0;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  initParticles();
}

function initParticles() {
  particles = [];
  for (let i = 0; i < 60; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      size: Math.random() * 2 + 0.5,
      speed: Math.random() * 0.3 + 0.1,
      opacity: 0,
      maxOpacity: Math.random() * 0.4 + 0.1,
      phase: Math.random() * Math.PI * 2,
      drift: (Math.random() - 0.5) * 0.15
    });
  }
}

const bodyPoints = {
  head: { cx: 0.5, cy: 0.08, rx: 0.06, ry: 0.055 },
  neck: [{ x: 0.47, y: 0.135 }, { x: 0.53, y: 0.135 }],
  shoulders: [{ x: 0.28, y: 0.2 }, { x: 0.72, y: 0.2 }],
  torso: [
    { x: 0.35, y: 0.2 }, { x: 0.33, y: 0.35 }, { x: 0.34, y: 0.48 },
    { x: 0.37, y: 0.55 }, { x: 0.63, y: 0.55 }, { x: 0.66, y: 0.48 },
    { x: 0.67, y: 0.35 }, { x: 0.65, y: 0.2 }
  ],
  leftArm: [
    { x: 0.28, y: 0.2 }, { x: 0.2, y: 0.28 }, { x: 0.15, y: 0.38 },
    { x: 0.13, y: 0.46 }, { x: 0.12, y: 0.52 }
  ],
  rightArm: [
    { x: 0.72, y: 0.2 }, { x: 0.8, y: 0.28 }, { x: 0.85, y: 0.38 },
    { x: 0.87, y: 0.46 }, { x: 0.88, y: 0.52 }
  ],
  leftLeg: [
    { x: 0.39, y: 0.55 }, { x: 0.37, y: 0.65 }, { x: 0.35, y: 0.75 },
    { x: 0.34, y: 0.85 }, { x: 0.33, y: 0.95 }
  ],
  rightLeg: [
    { x: 0.61, y: 0.55 }, { x: 0.63, y: 0.65 }, { x: 0.65, y: 0.75 },
    { x: 0.66, y: 0.85 }, { x: 0.67, y: 0.95 }
  ]
};

function drawGlowLine(points, baseOpacity, glowSize) {
  if (points.length < 2) return;
  const breathScale = 1 + Math.sin(breathPhase) * 0.012;
  const cx = W * 0.5;
  const cy = H * 0.45;

  ctx.save();
  for (let g = glowSize; g >= 0; g--) {
    const alpha = baseOpacity * (1 - g / glowSize) * 0.6;
    ctx.strokeStyle = 'rgba(79, 209, 197, ' + alpha + ')';
    ctx.lineWidth = 1.2 + g * 1.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    for (let i = 0; i < points.length; i++) {
      const px = cx + (points[i].x * W - cx) * breathScale;
      const py = cy + (points[i].y * H - cy) * breathScale;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
  }
  ctx.restore();
}

function drawGlowEllipse(cx, cy, rx, ry, baseOpacity, glowSize) {
  const bScale = 1 + Math.sin(breathPhase) * 0.012;
  const centerX = W * 0.5;
  const centerY = H * 0.45;
  const ecx = centerX + (cx - centerX) * bScale;
  const ecy = centerY + (cy - centerY) * bScale;

  ctx.save();
  for (let g = glowSize; g >= 0; g--) {
    const alpha = baseOpacity * (1 - g / glowSize) * 0.6;
    ctx.strokeStyle = 'rgba(79, 209, 197, ' + alpha + ')';
    ctx.lineWidth = 1.2 + g * 1.5;
    ctx.beginPath();
    ctx.ellipse(ecx, ecy, rx * bScale + g * 0.5, ry * bScale + g * 0.5, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();
}

function drawBody() {
  const head = bodyPoints.head;
  drawGlowEllipse(
    head.cx * W, head.cy * H,
    head.rx * W, head.ry * H,
    0.7, 4
  );

  const neckPts = bodyPoints.neck.map(p => ({ x: p.x, y: p.y }));
  drawGlowLine(neckPts, 0.5, 3);

  drawGlowLine(bodyPoints.torso, 0.6, 4);
  drawGlowLine(bodyPoints.leftArm, 0.5, 3);
  drawGlowLine(bodyPoints.rightArm, 0.5, 3);
  drawGlowLine(bodyPoints.leftLeg, 0.5, 3);
  drawGlowLine(bodyPoints.rightLeg, 0.5, 3);

  const shoulderLine = [bodyPoints.shoulders[0], { x: 0.35, y: 0.2 }];
  const shoulderLine2 = [bodyPoints.shoulders[1], { x: 0.65, y: 0.2 }];
  drawGlowLine(shoulderLine, 0.45, 3);
  drawGlowLine(shoulderLine2, 0.45, 3);

  drawAura();
}

function drawAura() {
  const bScale = 1 + Math.sin(breathPhase) * 0.012;
  const cx = W * 0.5;
  const cy = H * 0.42;
  const auraPulse = 0.03 + Math.sin(time * 0.8) * 0.015;

  const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, H * 0.48 * bScale);
  gradient.addColorStop(0, 'rgba(79, 209, 197, ' + (auraPulse + 0.02) + ')');
  gradient.addColorStop(0.3, 'rgba(79, 209, 197, ' + auraPulse + ')');
  gradient.addColorStop(0.6, 'rgba(79, 209, 197, ' + (auraPulse * 0.4) + ')');
  gradient.addColorStop(1, 'rgba(79, 209, 197, 0)');

  ctx.save();
  ctx.fillStyle = gradient;
  ctx.beginPath();
  ctx.ellipse(cx, cy, W * 0.3 * bScale, H * 0.48 * bScale, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawMeridians() {
  const bScale = 1 + Math.sin(breathPhase) * 0.012;
  const cx = W * 0.5;
  const cy = H * 0.45;

  const meridians = [
    [{ x: 0.5, y: 0.08 }, { x: 0.5, y: 0.2 }, { x: 0.5, y: 0.35 }, { x: 0.5, y: 0.5 }, { x: 0.5, y: 0.55 }],
    [{ x: 0.38, y: 0.2 }, { x: 0.36, y: 0.3 }, { x: 0.37, y: 0.42 }, { x: 0.39, y: 0.55 }],
    [{ x: 0.62, y: 0.2 }, { x: 0.64, y: 0.3 }, { x: 0.63, y: 0.42 }, { x: 0.61, y: 0.55 }],
    [{ x: 0.42, y: 0.25 }, { x: 0.32, y: 0.32 }, { x: 0.22, y: 0.4 }, { x: 0.15, y: 0.48 }],
    [{ x: 0.58, y: 0.25 }, { x: 0.68, y: 0.32 }, { x: 0.78, y: 0.4 }, { x: 0.85, y: 0.48 }],
  ];

  meridians.forEach((line, mi) => {
    ctx.save();
    for (let i = 0; i < line.length - 1; i++) {
      const p1x = cx + (line[i].x * W - cx) * bScale;
      const p1y = cy + (line[i].y * H - cy) * bScale;
      const p2x = cx + (line[i + 1].x * W - cx) * bScale;
      const p2y = cy + (line[i + 1].y * H - cy) * bScale;

      const pulsePos = (meridianPhase + mi * 0.3) % 1;
      const segFrac = i / (line.length - 1);
      const dist = Math.abs(pulsePos - segFrac);
      const intensity = Math.max(0, 1 - dist * 4);

      const alpha = 0.06 + intensity * 0.2;
      ctx.strokeStyle = 'rgba(79, 209, 197, ' + alpha + ')';
      ctx.lineWidth = 0.8 + intensity * 1.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(p1x, p1y);
      ctx.lineTo(p2x, p2y);
      ctx.stroke();

      if (intensity > 0.5) {
        const px = p1x + (p2x - p1x) * 0.5;
        const py = p1y + (p2y - p1y) * 0.5;
        const grad = ctx.createRadialGradient(px, py, 0, px, py, 8);
        grad.addColorStop(0, 'rgba(79, 209, 197, ' + (intensity * 0.4) + ')');
        grad.addColorStop(1, 'rgba(79, 209, 197, 0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(px, py, 8, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.restore();
  });
}

function drawParticles() {
  particles.forEach(p => {
    p.y -= p.speed;
    p.x += p.drift + Math.sin(time + p.phase) * 0.1;
    p.opacity = p.maxOpacity * (0.5 + 0.5 * Math.sin(time * 1.5 + p.phase));

    if (p.y < -10) {
      p.y = H + 10;
      p.x = Math.random() * W;
    }
    if (p.x < -10) p.x = W + 10;
    if (p.x > W + 10) p.x = -10;

    ctx.save();
    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 2);
    grad.addColorStop(0, 'rgba(79, 209, 197, ' + p.opacity + ')');
    grad.addColorStop(1, 'rgba(79, 209, 197, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = 'rgba(79, 209, 197, ' + (p.opacity * 1.5) + ')';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * 0.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

function drawOrganDots() {
  const bScale = 1 + Math.sin(breathPhase) * 0.012;
  const centerX = W * 0.5;
  const centerY = H * 0.45;

  organs.forEach(organ => {
    const rawX = (organ.position.x / 100) * W;
    const rawY = (organ.position.y / 100) * H;
    const ox = centerX + (rawX - centerX) * bScale;
    const oy = centerY + (rawY - centerY) * bScale;

    let pulseSpeed;
    if (organ.score >= 7) pulseSpeed = 1.0;
    else if (organ.score >= 5) pulseSpeed = 1.4;
    else if (organ.score >= 3) pulseSpeed = 1.9;
    else pulseSpeed = 2.5;

    const pulse = 0.5 + 0.5 * Math.sin(time * pulseSpeed + organ.score);
    const glowRadius = 12 + pulse * (organ.score < 5 ? 10 : 6);
    const glowAlpha = 0.15 + pulse * 0.25;

    const color = getScoreColorRGB(organ.score);

    ctx.save();
    const grad = ctx.createRadialGradient(ox, oy, 0, ox, oy, glowRadius);
    grad.addColorStop(0, 'rgba(' + color + ', ' + glowAlpha + ')');
    grad.addColorStop(0.5, 'rgba(' + color + ', ' + (glowAlpha * 0.3) + ')');
    grad.addColorStop(1, 'rgba(' + color + ', 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(ox, oy, glowRadius, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = 'rgba(' + color + ', 0.85)';
    ctx.beginPath();
    ctx.arc(ox, oy, 5, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
    ctx.beginPath();
    ctx.arc(ox, oy, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

function getScoreColorRGB(score) {
  if (score >= 7) return '79, 209, 197';
  if (score >= 5) return '168, 157, 140';
  if (score >= 3) return '197, 165, 114';
  return '232, 123, 107';
}

function handleTap(e) {
  const rect = canvas.getBoundingClientRect();
  const tapX = (e.clientX || e.touches[0].clientX) - rect.left;
  const tapY = (e.clientY || e.touches[0].clientY) - rect.top;

  const bScale = 1 + Math.sin(breathPhase) * 0.012;
  const centerX = W * 0.5;
  const centerY = H * 0.45;

  let closest = null;
  let closestDist = Infinity;

  organs.forEach(organ => {
    const rawX = (organ.position.x / 100) * W;
    const rawY = (organ.position.y / 100) * H;
    const ox = centerX + (rawX - centerX) * bScale;
    const oy = centerY + (rawY - centerY) * bScale;
    const dist = Math.sqrt((tapX - ox) ** 2 + (tapY - oy) ** 2);
    if (dist < closestDist && dist < 35) {
      closest = organ;
      closestDist = dist;
    }
  });

  if (closest && window.ReactNativeWebView) {
    window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'organTap', organId: closest.id }));
  }
}

canvas.addEventListener('click', handleTap);
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  handleTap(e);
}, { passive: false });

window.addEventListener('message', function(e) {
  try {
    const data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
    if (data.type === 'setOrgans') {
      organs = data.organs || [];
    }
  } catch (err) {}
});

document.addEventListener('message', function(e) {
  try {
    const data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
    if (data.type === 'setOrgans') {
      organs = data.organs || [];
    }
  } catch (err) {}
});

let lastTime = 0;
function animate(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  time += dt;
  breathPhase += dt * 0.9;
  meridianPhase = (meridianPhase + dt * 0.25) % 1;

  ctx.clearRect(0, 0, W, H);

  drawParticles();
  drawAura();
  drawMeridians();
  drawBody();
  drawOrganDots();

  requestAnimationFrame(animate);
}

resize();
window.addEventListener('resize', resize);
requestAnimationFrame(animate);
</script>
</body>
</html>
