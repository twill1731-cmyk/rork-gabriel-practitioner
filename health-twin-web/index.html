<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Health Twin</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #080C14;
      touch-action: none;
    }
    #canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <script src="https://unpkg.com/three@0.162.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.162.0/examples/js/controls/OrbitControls.js"></script>
  
  <script>
    // Wait for THREE to be available
    (function() {
      const THREE = window.THREE;
      
      // Scene setup
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x080C14);
      
      // Camera
      const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 0.95, 2.4);
      
      // Renderer
      const canvas = document.getElementById('canvas');
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      
      // OrbitControls
      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 1.0, 0);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 0.3;
      controls.minDistance = 1.5;
      controls.maxDistance = 5;
      controls.update();
      
      // Raycaster for tap detection
      const raycaster = new THREE.Raycaster();
      raycaster.params.Points.threshold = 0.05;
      const mouse = new THREE.Vector2();
      
      // Body profile: [y, radiusX, radiusZ]
      const torsoProfile = [
        [0.00, 0.08, 0.06],    // feet
        [0.15, 0.08, 0.06],    // ankles
        [0.40, 0.09, 0.07],    // calves
        [0.50, 0.09, 0.07],    // knees
        [0.75, 0.10, 0.08],    // thighs
        [0.92, 0.14, 0.10],    // hips/pelvis
        [1.05, 0.14, 0.11],    // lower abdomen
        [1.20, 0.16, 0.12],    // waist
        [1.35, 0.18, 0.13],    // upper abdomen
        [1.50, 0.20, 0.14],    // chest bottom
        [1.60, 0.21, 0.13],    // chest
        [1.70, 0.18, 0.12],    // shoulders/neck
        [1.77, 0.11, 0.10],    // neck
        [1.82, 0.10, 0.10],    // jaw
        [1.88, 0.09, 0.09],    // head
        [1.95, 0.07, 0.07]     // crown
      ];
      
      function getRadiusAtY(y, profile) {
        if (y <= profile[0][0]) return { x: profile[0][1], z: profile[0][2] };
        if (y >= profile[profile.length - 1][0]) {
          return { x: profile[profile.length - 1][1], z: profile[profile.length - 1][2] };
        }
        
        for (let i = 0; i < profile.length - 1; i++) {
          if (y >= profile[i][0] && y <= profile[i + 1][0]) {
            const t = (y - profile[i][0]) / (profile[i + 1][0] - profile[i][0]);
            const rx = profile[i][1] + t * (profile[i + 1][1] - profile[i][1]);
            const rz = profile[i][2] + t * (profile[i + 1][2] - profile[i][2]);
            return { x: rx, z: rz };
          }
        }
        return { x: 0.1, z: 0.1 };
      }
      
      // Generate body particles
      const bodyParticleCount = 12000;
      const bodyPositions = new Float32Array(bodyParticleCount * 3);
      let idx = 0;
      
      // Torso particles
      const torsoCount = Math.floor(bodyParticleCount * 0.5);
      for (let i = 0; i < torsoCount; i++) {
        const y = Math.random() * 1.95;
        const radius = getRadiusAtY(y, torsoProfile);
        
        // 70% near surface, 30% fill
        const fillFactor = Math.random() < 0.7 ? (0.85 + Math.random() * 0.15) : Math.random();
        
        const theta = Math.random() * Math.PI * 2;
        const rx = radius.x * fillFactor * Math.cos(theta);
        const rz = radius.z * fillFactor * Math.sin(theta);
        
        bodyPositions[idx++] = rx;
        bodyPositions[idx++] = y;
        bodyPositions[idx++] = rz;
      }
      
      // Legs (two cylinders)
      const legCount = Math.floor(bodyParticleCount * 0.25);
      for (let i = 0; i < legCount; i++) {
        const y = Math.random() * 0.92;
        const legRadius = 0.06 + Math.random() * 0.02;
        const fillFactor = Math.random() < 0.7 ? (0.85 + Math.random() * 0.15) : Math.random();
        
        const theta = Math.random() * Math.PI * 2;
        const rx = legRadius * fillFactor * Math.cos(theta);
        const rz = legRadius * fillFactor * Math.sin(theta);
        
        // Left or right leg
        const legOffset = Math.random() < 0.5 ? -0.09 : 0.09;
        
        bodyPositions[idx++] = rx + legOffset;
        bodyPositions[idx++] = y;
        bodyPositions[idx++] = rz;
      }
      
      // Arms
      const armCount = Math.floor(bodyParticleCount * 0.2);
      for (let i = 0; i < armCount; i++) {
        const t = Math.random();
        const y = 1.54 - t * (1.54 - 0.80);
        const armX = 0.22 + t * (0.23 - 0.22);
        const armRadius = 0.04;
        const fillFactor = Math.random() < 0.7 ? (0.85 + Math.random() * 0.15) : Math.random();
        
        const theta = Math.random() * Math.PI * 2;
        const rx = armRadius * fillFactor * Math.cos(theta);
        const rz = armRadius * fillFactor * Math.sin(theta);
        
        // Left or right arm
        const side = Math.random() < 0.5 ? -1 : 1;
        
        bodyPositions[idx++] = armX * side + rx;
        bodyPositions[idx++] = y;
        bodyPositions[idx++] = rz;
      }
      
      // Edge particles for crisp silhouette
      const edgeCount = bodyParticleCount - idx / 3;
      for (let i = 0; i < edgeCount; i++) {
        const y = Math.random() * 1.95;
        const radius = getRadiusAtY(y, torsoProfile);
        
        const edgeFactor = 0.95 + Math.random() * 0.05;
        const theta = Math.random() * Math.PI * 2;
        const rx = radius.x * edgeFactor * Math.cos(theta);
        const rz = radius.z * edgeFactor * Math.sin(theta);
        
        bodyPositions[idx++] = rx;
        bodyPositions[idx++] = y;
        bodyPositions[idx++] = rz;
      }
      
      // Body particle system
      const bodyGeometry = new THREE.BufferGeometry();
      bodyGeometry.setAttribute('position', new THREE.BufferAttribute(bodyPositions, 3));
      
      const bodyMaterial = new THREE.PointsMaterial({
        color: 0x4ECECE,
        size: 0.005,
        transparent: true,
        opacity: 0.8,
        blending: THREE.AdditiveBlending,
        sizeAttenuation: true,
        depthWrite: false
      });
      
      const bodyParticles = new THREE.Points(bodyGeometry, bodyMaterial);
      scene.add(bodyParticles);
      
      // Organ positions and data
      const organPositions = {
        brain: [0, 1.85, 0.08],
        thyroid: [0, 1.67, 0.08],
        heart: [-0.05, 1.43, 0.12],
        lungs: [0.14, 1.46, 0.06],
        liver: [0.12, 1.24, 0.12],
        stomach: [-0.04, 1.27, 0.14],
        kidneys: [-0.11, 1.14, -0.04],
        adrenals: [-0.08, 1.32, -0.02],
        gut: [0, 1.02, 0.12],
        reproductive: [0, 0.92, 0.10]
      };
      
      const organData = {};
      const organMeshes = {};
      
      function getColorForScore(score) {
        if (score >= 7) return 0x4FD1C5;
        if (score >= 5) return 0xa89d8c;
        if (score >= 3) return 0xC5A572;
        return 0xe87b6b;
      }
      
      // Create organ spheres
      Object.keys(organPositions).forEach(organId => {
        const pos = organPositions[organId];
        organData[organId] = { score: 7, trend: 0 };
        
        const geometry = new THREE.SphereGeometry(0.025, 16, 16);
        const material = new THREE.MeshBasicMaterial({
          color: getColorForScore(7),
          transparent: true,
          opacity: 0.9,
          emissive: getColorForScore(7),
          emissiveIntensity: 0.5
        });
        
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(pos[0], pos[1], pos[2]);
        mesh.userData.organId = organId;
        scene.add(mesh);
        organMeshes[organId] = mesh;
      });
      
      // Organ connections for particle streams
      const connections = [
        ['brain', 'thyroid'],
        ['thyroid', 'heart'],
        ['heart', 'lungs'],
        ['heart', 'liver'],
        ['liver', 'stomach'],
        ['stomach', 'gut'],
        ['kidneys', 'adrenals'],
        ['adrenals', 'heart'],
        ['gut', 'reproductive']
      ];
      
      // Particle streams between organs
      const streamParticles = [];
      connections.forEach(([from, to]) => {
        const fromPos = organPositions[from];
        const toPos = organPositions[to];
        
        const particleCount = 20;
        const positions = new Float32Array(particleCount * 3);
        
        for (let i = 0; i < particleCount; i++) {
          const t = i / particleCount;
          positions[i * 3] = fromPos[0] + t * (toPos[0] - fromPos[0]);
          positions[i * 3 + 1] = fromPos[1] + t * (toPos[1] - fromPos[1]);
          positions[i * 3 + 2] = fromPos[2] + t * (toPos[2] - fromPos[2]);
        }
        
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        
        const material = new THREE.PointsMaterial({
          color: 0x4ECECE,
          size: 0.003,
          transparent: true,
          opacity: 0.4,
          blending: THREE.AdditiveBlending,
          sizeAttenuation: true,
          depthWrite: false
        });
        
        const points = new THREE.Points(geometry, material);
        scene.add(points);
        streamParticles.push({ points, from: fromPos, to: toPos, offset: Math.random() * Math.PI * 2 });
      });
      
      // Ambient particles
      const ambientCount = 400;
      const ambientPositions = new Float32Array(ambientCount * 3);
      for (let i = 0; i < ambientCount; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const r = 1.5 + Math.random() * 0.5;
        
        ambientPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        ambientPositions[i * 3 + 1] = 1.0 + r * Math.cos(phi);
        ambientPositions[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
      }
      
      const ambientGeometry = new THREE.BufferGeometry();
      ambientGeometry.setAttribute('position', new THREE.BufferAttribute(ambientPositions, 3));
      
      const ambientMaterial = new THREE.PointsMaterial({
        color: 0x4ECECE,
        size: 0.002,
        transparent: true,
        opacity: 0.3,
        blending: THREE.AdditiveBlending,
        sizeAttenuation: true,
        depthWrite: false
      });
      
      const ambientParticles = new THREE.Points(ambientGeometry, ambientMaterial);
      scene.add(ambientParticles);
      
      // Aura shell with fresnel shader
      const auraGeometry = new THREE.SphereGeometry(0.35, 32, 32);
      const auraShader = {
        vertexShader: `
          varying vec3 vNormal;
          varying vec3 vViewPosition;
          
          void main() {
            vNormal = normalize(normalMatrix * normal);
            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            vViewPosition = -mvPosition.xyz;
            gl_Position = projectionMatrix * mvPosition;
          }
        `,
        fragmentShader: `
          varying vec3 vNormal;
          varying vec3 vViewPosition;
          uniform vec3 glowColor;
          
          void main() {
            vec3 viewDir = normalize(vViewPosition);
            float fresnel = pow(1.0 - abs(dot(viewDir, vNormal)), 3.0);
            
            gl_FragColor = vec4(glowColor, fresnel * 0.3);
          }
        `,
        uniforms: {
          glowColor: { value: new THREE.Color(0x4ECECE) }
        }
      };
      
      const auraMaterial = new THREE.ShaderMaterial({
        vertexShader: auraShader.vertexShader,
        fragmentShader: auraShader.fragmentShader,
        uniforms: auraShader.uniforms,
        transparent: true,
        blending: THREE.AdditiveBlending,
        side: THREE.BackSide,
        depthWrite: false
      });
      
      const auraMesh = new THREE.Mesh(auraGeometry, auraMaterial);
      auraMesh.position.set(0, 1.0, 0);
      scene.add(auraMesh);
      
      // Background gradient glow
      const glowGeometry = new THREE.PlaneGeometry(4, 4);
      const glowMaterial = new THREE.ShaderMaterial({
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          varying vec2 vUv;
          void main() {
            vec2 center = vec2(0.5, 0.5);
            float dist = distance(vUv, center);
            float glow = 1.0 - smoothstep(0.0, 0.6, dist);
            vec3 color = vec3(0.3, 0.8, 0.8) * glow * 0.1;
            gl_FragColor = vec4(color, 1.0);
          }
        `,
        transparent: false,
        depthWrite: false
      });
      
      const glowPlane = new THREE.Mesh(glowGeometry, glowMaterial);
      glowPlane.position.set(0, 1.0, -1.5);
      scene.add(glowPlane);
      
      // Animation state
      let time = 0;
      let scanBeamY = 0;
      let scanDirection = 1;
      
      // Message handler from React Native
      window.addEventListener('message', (event) => {
        try {
          const data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
          
          if (data.type === 'setOrgans' && data.organs) {
            data.organs.forEach(organ => {
              if (organData[organ.id]) {
                organData[organ.id].score = organ.score;
                organData[organ.id].trend = organ.trend || 0;
                
                // Update organ color
                const mesh = organMeshes[organ.id];
                if (mesh) {
                  const color = getColorForScore(organ.score);
                  mesh.material.color.setHex(color);
                  mesh.material.emissive.setHex(color);
                }
              }
            });
          }
        } catch (e) {
          console.error('Message parsing error:', e);
        }
      });
      
      // Touch/click handler for tap detection
      function onTap(event) {
        event.preventDefault();
        
        const rect = canvas.getBoundingClientRect();
        const x = event.clientX || (event.touches && event.touches[0].clientX);
        const y = event.clientY || (event.touches && event.touches[0].clientY);
        
        mouse.x = ((x - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((y - rect.top) / rect.height) * 2 + 1;
        
        raycaster.setFromCamera(mouse, camera);
        
        const organMeshArray = Object.values(organMeshes);
        const intersects = raycaster.intersectObjects(organMeshArray);
        
        if (intersects.length > 0) {
          const organId = intersects[0].object.userData.organId;
          
          if (window.ReactNativeWebView) {
            window.ReactNativeWebView.postMessage(JSON.stringify({
              type: 'organTap',
              organId: organId
            }));
          }
        }
      }
      
      canvas.addEventListener('click', onTap);
      canvas.addEventListener('touchstart', onTap);
      
      // Window resize
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
      
      // Animation loop
      function animate() {
        requestAnimationFrame(animate);
        
        time += 0.016;
        
        // Breathing animation
        const breathScale = 1.0 + Math.sin(time * 0.8) * 0.02;
        bodyParticles.scale.y = breathScale;
        
        // Scanning beam
        scanBeamY += scanDirection * 0.01;
        if (scanBeamY > 2.0) {
          scanBeamY = 2.0;
          scanDirection = -1;
        } else if (scanBeamY < 0) {
          scanBeamY = 0;
          scanDirection = 1;
        }
        
        // Update body particle brightness based on scan beam
        const positions = bodyGeometry.attributes.position.array;
        for (let i = 0; i < positions.length; i += 3) {
          const y = positions[i + 1];
          const dist = Math.abs(y - scanBeamY);
          // This would require a custom shader for per-particle brightness
          // For now, the scanning effect is subtle through the global animation
        }
        
        // Animate particle streams
        streamParticles.forEach((stream, idx) => {
          const positions = stream.points.geometry.attributes.position.array;
          const flowSpeed = time + stream.offset;
          
          for (let i = 0; i < positions.length; i += 3) {
            const baseT = i / (positions.length - 3);
            const flow = (Math.sin(flowSpeed + baseT * Math.PI * 2) + 1) * 0.5;
            
            const t = baseT;
            const x = stream.from[0] + t * (stream.to[0] - stream.from[0]);
            const y = stream.from[1] + t * (stream.to[1] - stream.from[1]);
            const z = stream.from[2] + t * (stream.to[2] - stream.from[2]);
            
            positions[i] = x + Math.sin(flowSpeed + baseT * 10) * 0.01;
            positions[i + 1] = y;
            positions[i + 2] = z + Math.cos(flowSpeed + baseT * 10) * 0.01;
          }
          
          stream.points.geometry.attributes.position.needsUpdate = true;
        });
        
        // Rotate ambient particles
        ambientParticles.rotation.y = time * 0.05;
        
        // Pulse aura
        const auraPulse = 1.0 + Math.sin(time * 1.2) * 0.05;
        auraMesh.scale.set(auraPulse, auraPulse, auraPulse);
        
        controls.update();
        renderer.render(scene, camera);
      }
      
      animate();
    })();
  </script>
</body>
</html>
